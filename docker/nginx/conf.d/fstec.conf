map $http_upgrade $connection_upgrade {
  default upgrade;
  "" close;
}

# Next.js RSC prefetch (?_rsc=) fires hundreds of parallel GETs — separate bucket from page nav.
map $args $global_limit_key {
  default $binary_remote_addr;
  ~(^|&)_rsc= "";
}

map $args $rsc_limit_key {
  default "";
  ~(^|&)_rsc= $binary_remote_addr;
}

limit_req_zone $global_limit_key zone=global_limit:10m rate=40r/s;
limit_req_zone $rsc_limit_key zone=rsc_limit:10m rate=200r/s;
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;

upstream nextjs_upstream {
  zone nextjs_upstream 64k;
  least_conn;
  server app:3000 resolve;
  keepalive 32;
}

# HTTP → HTTPS (healthcheck hits :8080/healthz before redirect)
server {
  listen 8080;
  listen [::]:8080;
  server_name _;

  location = /healthz {
    access_log off;
    return 200 "ok\n";
    add_header Content-Type text/plain;
  }

  location / {
    return 301 https://$host:8443$request_uri;
  }
}

server {
  listen 8443 ssl;
  listen [::]:8443 ssl;
  http2 on;
  server_name _;

  ssl_certificate     /etc/nginx/ssl/fullchain.pem;
  ssl_certificate_key /etc/nginx/ssl/privkey.pem;
  include /etc/nginx/snippets/ssl-params.conf;
  include /etc/nginx/snippets/security-headers.conf;

  limit_conn conn_limit 100;

  location /_next/static/ {
    proxy_pass http://nextjs_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    add_header Cache-Control "public, max-age=31536000, immutable";
    access_log off;
  }

  location / {
    limit_req zone=global_limit burst=80 nodelay;
    limit_req zone=rsc_limit burst=400 nodelay;

    proxy_pass http://nextjs_upstream;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port 8443;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    proxy_hide_header X-Powered-By;
    proxy_read_timeout 60s;
    proxy_send_timeout 60s;
    proxy_connect_timeout 5s;

    proxy_buffering on;
    proxy_buffer_size 16k;
    proxy_buffers 8 16k;
  }

  location /api/ {
    limit_req zone=api_limit burst=40 nodelay;

    proxy_pass http://nextjs_upstream;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port 8443;

    proxy_hide_header X-Powered-By;
    proxy_read_timeout 120s;
    proxy_send_timeout 120s;
    proxy_connect_timeout 5s;
  }

  location = /healthz {
    access_log off;
    return 200 "ok\n";
    add_header Content-Type text/plain;
  }
}
