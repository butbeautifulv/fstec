# HA overlay — use with docker-compose.prod.yml
#   docker compose -f docker-compose.prod.yml -f docker-compose.ha.yml --profile ha up -d --scale app=8

services:
  db-primary:
    profiles: ["ha"]
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fstec}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-fstec}
      POSTGRES_REPLICATION_PASSWORD: ${POSTGRES_REPLICATION_PASSWORD:?set POSTGRES_REPLICATION_PASSWORD}
    command:
      - postgres
      - -c
      - wal_level=replica
      - -c
      - max_wal_senders=5
      - -c
      - hot_standby=on
      - -c
      - max_replication_slots=5
    volumes:
      - postgres_primary_data:/var/lib/postgresql/data
      - ./docker/postgres/primary/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fstec} -d ${POSTGRES_DB:-fstec}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [internal]

  db-replica:
    profiles: ["ha"]
    image: postgres:16-alpine
    restart: unless-stopped
    user: root
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fstec}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-fstec}
      POSTGRES_REPLICATION_USER: replicator
      POSTGRES_REPLICATION_PASSWORD: ${POSTGRES_REPLICATION_PASSWORD:?set POSTGRES_REPLICATION_PASSWORD}
      POSTGRES_PRIMARY_HOST: db-primary
    volumes:
      - postgres_replica_data:/var/lib/postgresql/data
      - ./docker/postgres/replica/entrypoint.sh:/entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    depends_on:
      db-primary:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fstec} -d ${POSTGRES_DB:-fstec}"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 60s
    networks: [internal]

  pgbouncer:
    profiles: ["ha"]
    build:
      context: ./docker/pgbouncer
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fstec}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      PGBOUNCER_LISTEN_PORT: "6432"
      PGBOUNCER_CONFIG: /etc/pgbouncer/pgbouncer.ini
    depends_on:
      db-primary:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "PGPASSWORD=$${POSTGRES_PASSWORD} psql -h 127.0.0.1 -p 6432 -U $${POSTGRES_USER} -d fstec -c 'SELECT 1'",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [internal]

  pgbouncer-read:
    profiles: ["ha"]
    build:
      context: ./docker/pgbouncer
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fstec}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      PGBOUNCER_LISTEN_PORT: "6433"
      PGBOUNCER_CONFIG: /etc/pgbouncer/pgbouncer-read.ini
    depends_on:
      db-replica:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "PGPASSWORD=$${POSTGRES_PASSWORD} psql -h 127.0.0.1 -p 6433 -U $${POSTGRES_USER} -d fstec -c 'SELECT 1'",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [internal]

  redis-master:
    profiles: ["ha"]
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "/etc/redis/master.conf"]
    volumes:
      - ./docker/redis/master.conf:/etc/redis/master.conf:ro
      - redis_master_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks: [internal]

  redis-replica:
    profiles: ["ha"]
    image: redis:7-alpine
    restart: unless-stopped
    command:
      - redis-server
      - /etc/redis/replica.conf
      - --replicaof
      - redis-master
      - "6379"
    volumes:
      - ./docker/redis/replica.conf:/etc/redis/replica.conf:ro
      - redis_replica_data:/data
    depends_on:
      redis-master:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks: [internal]

  redis-sentinel:
    profiles: ["ha"]
    image: redis:7-alpine
    restart: unless-stopped
    command:
      - sh
      - -c
      - cp /etc/redis/sentinel.conf /tmp/sentinel.conf && exec redis-sentinel /tmp/sentinel.conf
    volumes:
      - ./docker/redis/sentinel.conf:/etc/redis/sentinel.conf:ro
    depends_on:
      redis-master:
        condition: service_healthy
      redis-replica:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "26379", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [internal]

  minio1:
    profiles: ["ha"]
    image: minio/minio:latest
    restart: unless-stopped
    hostname: minio1
    command: server http://minio{1...2}/data{1...2} --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:?set S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:?set S3_SECRET_KEY}
    volumes:
      - minio1_data1:/data1
      - minio1_data2:/data2
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks: [internal]

  minio2:
    profiles: ["ha"]
    image: minio/minio:latest
    restart: unless-stopped
    hostname: minio2
    command: server http://minio{1...2}/data{1...2} --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:?set S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:?set S3_SECRET_KEY}
    volumes:
      - minio2_data1:/data1
      - minio2_data2:/data2
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks: [internal]

  minio-init-ha:
    profiles: ["ha"]
    image: minio/mc:latest
    depends_on:
      minio1:
        condition: service_healthy
      minio2:
        condition: service_healthy
    environment:
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET: ${S3_BUCKET:-fstec-attachments}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio1:9000 $$S3_ACCESS_KEY $$S3_SECRET_KEY &&
      mc mb local/$$S3_BUCKET --ignore-existing
      "
    restart: "no"
    networks: [internal]

  migrate-ha:
    profiles: ["ha"]
    build:
      context: .
      dockerfile: Dockerfile
      target: migrate
    restart: "no"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-fstec}:${POSTGRES_PASSWORD}@db-primary:5432/${POSTGRES_DB:-fstec}?schema=public
    depends_on:
      db-primary:
        condition: service_healthy
    networks: [internal]

  seed-ha:
    profiles: ["seed-ha"]
    build:
      context: .
      dockerfile: Dockerfile
      target: deps
    working_dir: /app
    command: ["npx", "tsx", "prisma/seed.ts"]
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-fstec}:${POSTGRES_PASSWORD}@db-primary:5432/${POSTGRES_DB:-fstec}?schema=public
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@fstec.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      SEED_MOCK: ${SEED_MOCK:-}
    volumes:
      - ./prisma:/app/prisma:ro
      - ./lib:/app/lib:ro
    depends_on:
      migrate-ha:
        condition: service_completed_successfully
    networks: [internal]

  app:
    depends_on:
      !reset
      migrate-ha:
        condition: service_completed_successfully
      pgbouncer:
        condition: service_healthy
      pgbouncer-read:
        condition: service_healthy
      redis-sentinel:
        condition: service_healthy
      minio-init-ha:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-fstec}:${POSTGRES_PASSWORD}@pgbouncer:6432/${POSTGRES_DB:-fstec}?schema=public&pgbouncer=true&connection_limit=5&pool_timeout=10
      DATABASE_READ_URL: postgresql://${POSTGRES_USER:-fstec}:${POSTGRES_PASSWORD}@pgbouncer-read:6433/${POSTGRES_DB:-fstec}?schema=public&pgbouncer=true&connection_limit=5&pool_timeout=10
      REDIS_URL: ""
      REDIS_SENTINELS: redis-sentinel:26379
      REDIS_MASTER_NAME: fstec-master
      S3_ENDPOINT: http://minio1:9000

volumes:
  postgres_primary_data:
  postgres_replica_data:
  redis_master_data:
  redis_replica_data:
  minio1_data1:
  minio1_data2:
  minio2_data1:
  minio2_data2:
