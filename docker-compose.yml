services:
  db:
    image: postgres:16-alpine
    container_name: fstec_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fstec}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fstec}
      POSTGRES_DB: ${POSTGRES_DB:-fstec}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fstec} -d ${POSTGRES_DB:-fstec}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
