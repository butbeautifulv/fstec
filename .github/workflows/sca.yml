name: OSA / SCA (Trivy)

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: "0 7 * * 1"

permissions:
  contents: read
  security-events: write

jobs:
  osa:
    name: OSA — open-source dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Scan npm dependencies for vulnerabilities
        uses: aquasecurity/trivy-action@0.30.0
        with:
          scan-type: fs
          scan-ref: package-lock.json
          format: sarif
          output: trivy-osa.sarif
          severity: CRITICAL,HIGH,MEDIUM
          scanners: vuln

      - name: Upload OSA vulnerability results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-osa.sarif
          category: trivy-osa

      - name: Scan npm dependency licenses
        uses: aquasecurity/trivy-action@0.30.0
        with:
          scan-type: fs
          scan-ref: package-lock.json
          format: table
          scanners: license

      - name: Generate SBOM (CycloneDX)
        uses: aquasecurity/trivy-action@0.30.0
        with:
          scan-type: fs
          scan-ref: package-lock.json
          format: cyclonedx
          output: sbom.cyclonedx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx
          path: sbom.cyclonedx.json
          retention-days: 90

  sca-image:
    name: SCA — production Docker image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t fstec:ci-sca .

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@0.30.0
        with:
          scan-type: image
          image-ref: fstec:ci-sca
          format: sarif
          output: trivy-image.sarif
          severity: CRITICAL,HIGH,MEDIUM

      - name: Upload image scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image
